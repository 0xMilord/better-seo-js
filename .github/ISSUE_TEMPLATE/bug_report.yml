name: Bug report
description: Something is wrong with behavior, types, or docs.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security issues**, use **SECURITY.md** instead of this form.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Actual behavior, error messages, stack traces.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Package versions, minimal code snippet, or link to a branch.
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Package / area
      description: e.g. better-seo.js, @better-seo/next, examples/nextjs-app
    validations:
      required: false

name: Feature request
description: Suggest an enhancement (check internal-docs/FEATURES.md for existing IDs).
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: Who benefits and what workflow does this unlock?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: API shape, adapter vs core boundary (see ARCHITECTURE.md).
    validations:
      required: true
  - type: checkboxes
    id: docs
    attributes:
      label: Traceability
      description: Link to **FEATURES** ID or **Roadmap** wave if known.
      options:
        - label: I checked FEATURES.md / Roadmap.md for overlap
          required: false
